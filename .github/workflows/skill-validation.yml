name: Skill validation

on:
  push:
    paths:
      - "sandbox/**"
  pull_request:
    paths:
      - "sandbox/**"

jobs:
  # Runs skill_harness.py bare (no container isolation) against fixed,
  # reviewed fixture files checked into sandbox/examples/ - safe because
  # these go through the same PR review as any other source file, unlike
  # validate-candidates below which handles arbitrary LLM-generated code.
  harness-self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Known-good reference skill must pass
        run: python sandbox/skill_harness.py sandbox/examples/greeter_skill.py

      - name: Known-bad reference skill must fail
        run: |
          if python sandbox/skill_harness.py sandbox/examples/bad_skill_disallowed_action.py; then
            echo "::error::bad_skill_disallowed_action.py should have failed validation but passed"
            exit 1
          fi
          echo "confirmed: disallowed action was correctly rejected"

  validate-candidates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate any queued candidate skills
        run: |
          shopt -s nullglob
          candidates=(sandbox/candidates/*.py)
          if [ ${#candidates[@]} -eq 0 ]; then
            echo "no candidates queued, nothing to validate"
            exit 0
          fi
          status=0
          for skill in "${candidates[@]}"; do
            name="$(basename "$skill")"
            echo "=== validating $name ==="
            # sandbox/candidates/ holds arbitrary LLM-generated code (see
            # skill_writer.py) - this used to invoke skill_harness.py bare
            # on the runner (full network access, no resource limits), so a
            # PR that merely added a file here could execute arbitrary code
            # with the runner's full privileges the moment this workflow
            # fired, before any human reviewed it. Same lockdown flags as
            # sandbox/run_skill_validation.sh, which is the thing that
            # actually promotes a skill to approved/ - this CI job only
            # gates, it never touches approved/ itself.
            docker run --rm \
              --network none \
              --read-only \
              --tmpfs /tmp:size=16m \
              --memory 256m \
              --memory-swap 256m \
              --pids-limit 32 \
              --cpus 0.5 \
              --cap-drop ALL \
              --security-opt no-new-privileges \
              --user 65534:65534 \
              -v "$(realpath "$skill")":/skill/candidate.py:ro \
              -v "$(realpath sandbox/skill_harness.py)":/skill/harness.py:ro \
              python:3.12-slim \
              timeout 20 python /skill/harness.py /skill/candidate.py || status=1
          done
          exit $status
